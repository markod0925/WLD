name: Build and Upload Windows Release Asset

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          $ErrorActionPreference = 'Stop'
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build application
        run: |
          $ErrorActionPreference = 'Stop'
          python -m PyInstaller --noconfirm --clean WLD.spec

      - name: Smoke test packaged app
        run: |
          $ErrorActionPreference = 'Stop'

          $exePath = Join-Path $env:GITHUB_WORKSPACE 'dist\WLD\WLD.exe'
          if (-not (Test-Path $exePath)) {
            throw "Expected build output not found: $exePath"
          }

          & $exePath --help | Out-Null

      - name: Package dist/WLD
        run: |
          $ErrorActionPreference = 'Stop'

          $distDir = Join-Path $env:GITHUB_WORKSPACE 'dist\WLD'
          if (-not (Test-Path $distDir)) {
            throw "Expected build output not found: $distDir"
          }

          $tag = "${{ github.event.release.tag_name }}"
          $zipPath = Join-Path $env:RUNNER_TEMP "WLD-$tag-windows.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path $distDir -DestinationPath $zipPath -Force
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          gh release upload "${{ github.event.release.tag_name }}" "$env:ZIP_PATH" --repo "${{ github.repository }}" --clobber
